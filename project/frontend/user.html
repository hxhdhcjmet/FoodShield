<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户端 - 匿名外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">🍔 匿名外卖</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="#">登录</a>
            <a class="nav-link" href="#">我的订单</a>
            <a class="nav-link active" href="#">订单通信</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- 左侧：订单认证 -->
        <div class="col-md-5">
            <div class="card p-4">
                <h4 class="card-title text-primary">订单认证入口</h4>
                <div class="mb-3">
                    <label>订单号</label>
                    <input type="text" class="form-control" value="ORDER20250313001" readonly>
                </div>
                <div class="mb-3">
                    <label>认证Token（模拟）</label>
                    <input type="text" class="form-control" value="tk_8f3k9x2m" readonly>
                </div>
                <button onclick="alert('✅ 认证通过！进入匿名聊天通道')" class="btn btn-primary w-100">
                    提交认证 → 进入聊天
                </button>
                <small class="text-success d-block mt-2 text-center">PID: p_7a9b2c4d（已匿名）</small>
            </div>
        </div>

        <!-- 右侧：聊天预览 -->
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-primary text-white">匿名聊天通道（与骑手）</div>
                <div class="chat-preview p-3">
                    <div class="text-end"><span class="badge bg-success">骑手</span> 您的外卖已到楼下</div>
                    <div class="text-start mt-2"><span class="badge bg-primary">我</span> 好的，谢谢！</div>
                </div>
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="输入消息...">
                        <button class="btn btn-primary">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
