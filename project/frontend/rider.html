<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑手端 - 匿名外卖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; }
        .order-card { border: none; border-radius: 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .order-card:hover { transform: translateY(-4px); }
        .pid { font-family: monospace; background: #f8f9fa; padding: 10px; border-radius: 8px; word-break: break-all; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🛵 骑手中心</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/rider.html">待接订单</a>
            <a class="nav-link" href="/user.html">用户端</a>
            <a class="nav-link" href="/admin.html">管理员端</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h2 class="mb-4">骑手端 · 待接订单</h2>
    <div id="alertBox"></div>
    <div id="ordersList" class="row g-4"></div>
    <div id="emptyState" class="text-center py-5 d-none">
        <h3 class="text-muted">暂无待接订单</h3>
        <p>用户端创建新订单后刷新即可看到</p>
    </div>
    <div class="text-center mt-4">
        <button class="btn btn-success btn-lg" onclick="refreshOrders()">🔄 刷新订单列表</button>
    </div>
</div>

<script>
const BASE_URL = "http://127.0.0.1:5000";

function showAlert(type, message) {
    document.getElementById("alertBox").innerHTML = `<div class="alert alert-${type}">${message}</div>`;
}

async function loadOrders() {
    const list = document.getElementById("ordersList");
    const empty = document.getElementById("emptyState");
    list.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-success"></div><p>加载中...</p></div>';

    try {
        const res = await fetch(`${BASE_URL}/get_pending_orders`);
        const result = await res.json();

        if (!result.success || !result.data || result.data.length === 0) {
            list.innerHTML = "";
            empty.classList.remove("d-none");
            return;
        }

        empty.classList.add("d-none");
        let html = "";
        result.data.forEach(o => {
            html += `
                <div class="col-lg-6">
                    <div class="card order-card p-4">
                        <h5>订单号：${o.order_id}</h5>
                        <p class="mb-2">用户匿名 PID：</p>
                        <div class="pid">${o.pid}</div>
                        <button class="btn btn-success w-100 mt-3" onclick="takeOrder('${o.order_id}', '${o.pid}')">
                            接单并进入匿名聊天
                        </button>
                    </div>
                </div>`;
        });
        list.innerHTML = html;
    } catch (e) {
        showAlert("danger", "无法连接后端，请确认后端正在运行！");
    }
}

async function takeOrder(orderId, pid) {
    showAlert("success", `✅ 已接单！订单 ${orderId}<br>用户PID: ${pid}`);
    setTimeout(() => alert("🚀 聊天通道打开（演示模式）"), 800);
}

function refreshOrders() { loadOrders(); }

window.onload = loadOrders;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
